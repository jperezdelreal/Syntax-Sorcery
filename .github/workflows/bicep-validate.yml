name: Bicep Validate

on:
  pull_request:
    paths:
      - 'scripts/azure/**'

permissions:
  contents: read

jobs:
  bicep-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Lint Bicep (best practices)
        run: bicep lint scripts/azure/main.bicep

      - name: Build Bicep (compile + type-check)
        run: bicep build scripts/azure/main.bicep --outfile /dev/null

