# ============================================================
#  VIGÍA PR Workflow — Autonomous Web Testing on PRs
# ============================================================
#  Triggers VIGÍA when a PR is labeled with 'vigia' or when
#  manually dispatched. Posts results as a PR comment and
#  uploads screenshots as artifacts.
#
#  To run: add the 'vigia' label to any PR, or trigger
#  manually from the Actions tab.
# ============================================================

name: 'VIGÍA — PR Testing'

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL to test'
        required: true
        default: 'https://citypulselabs.azurestaticapps.net'
      max-turns:
        description: 'Maximum agent turns'
        required: false
        default: '10'
      pr-number:
        description: 'PR number to comment on (optional)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write
  actions: write

# Cancel in-progress runs for the same PR
concurrency:
  group: vigia-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  vigia:
    name: 'VIGÍA Scan'
    runs-on: ubuntu-latest
    # Only run when 'vigia' label is added, or on manual dispatch
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'vigia')
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run VIGÍA
        uses: ./.github/actions/vigia
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          url: ${{ github.event.inputs.url || 'https://citypulselabs.azurestaticapps.net' }}
          max-turns: ${{ github.event.inputs.max-turns || '10' }}
          severity-threshold: 'minor'
          output-format: 'md'

      - name: Remove trigger label
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'vigia',
              });
            } catch (err) {
              // Label may have already been removed
              console.log(`Could not remove label: ${err.message}`);
            }
