name: GDD → Issues Pipeline

on:
  push:
    paths:
      - 'docs/gdds/**/*.md'
      - '!docs/gdds/examples/**'
  workflow_dispatch:
    inputs:
      gdd_file:
        description: 'Path to GDD file (e.g., docs/gdds/my-game.md)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no issues created)'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Detect GDD files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ inputs.gdd_file }}" >> "$GITHUB_OUTPUT"
          else
            # Find new/modified GDD files in the push
            FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'docs/gdds/**/*.md' | grep -v 'examples/' || true)
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert GDDs to Issues
        if: steps.detect.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          IFS=$'\n'
          for FILE in ${{ steps.detect.outputs.files }}; do
            if [ -f "$FILE" ]; then
              echo "Processing: $FILE"
              node scripts/gdd-to-issues.js --file "$FILE" $DRY_RUN_FLAG
            fi
          done
