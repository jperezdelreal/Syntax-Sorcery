name: Azure Cost Alert

on:
  schedule:
    # Daily at 07:00 UTC — check previous day's accrued spend
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — report costs without triggering actions'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  issues: write
  contents: read

# Budget thresholds (EUR/month)
env:
  BUDGET_LIMIT: '500'
  WARN_THRESHOLD: '400'     # 80% — Tank alert
  ESCALATE_THRESHOLD: '450' # 90% — Morpheus + founder alert
  EMERGENCY_THRESHOLD: '480' # 96% — auto-kill idle resources
  CURRENCY: 'EUR'

jobs:
  cost-check:
    runs-on: ubuntu-latest
    # Only run if Azure credentials are configured
    if: ${{ vars.AZURE_SUBSCRIPTION_ID != '' || secrets.AZURE_CREDENTIALS != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check current month spend
        id: cost
        run: |
          set -euo pipefail

          # Current billing period
          START_DATE=$(date -u -d "$(date +%Y-%m-01)" +%Y-%m-%d)
          END_DATE=$(date -u +%Y-%m-%d)
          DAYS_IN_MONTH=$(date -u -d "$(date -u -d 'next month' +%Y-%m-01) -1 day" +%d)
          CURRENT_DAY=$(date -u +%d | sed 's/^0//')

          echo "Billing period: $START_DATE to $END_DATE (day $CURRENT_DAY of $DAYS_IN_MONTH)"

          # Query Azure Cost Management for current month spend
          SPEND_RAW=$(az consumption usage list \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --query "[].pretaxCost" \
            --output tsv 2>/dev/null | paste -sd+ | bc -l 2>/dev/null || echo "0")

          # Round to 2 decimals
          SPEND=$(printf "%.2f" "$SPEND_RAW")

          # Project end-of-month spend (linear extrapolation)
          if [ "$CURRENT_DAY" -gt 0 ]; then
            PROJECTED=$(echo "scale=2; $SPEND * $DAYS_IN_MONTH / $CURRENT_DAY" | bc -l)
          else
            PROJECTED="0.00"
          fi

          PERCENT=$(echo "scale=1; $SPEND * 100 / ${{ env.BUDGET_LIMIT }}" | bc -l)
          PROJECTED_PERCENT=$(echo "scale=1; $PROJECTED * 100 / ${{ env.BUDGET_LIMIT }}" | bc -l)

          echo "spend=$SPEND" >> "$GITHUB_OUTPUT"
          echo "projected=$PROJECTED" >> "$GITHUB_OUTPUT"
          echo "percent=$PERCENT" >> "$GITHUB_OUTPUT"
          echo "projected_percent=$PROJECTED_PERCENT" >> "$GITHUB_OUTPUT"
          echo "day=$CURRENT_DAY" >> "$GITHUB_OUTPUT"
          echo "days_in_month=$DAYS_IN_MONTH" >> "$GITHUB_OUTPUT"

          # Determine alert level
          LEVEL="ok"
          if (( $(echo "$SPEND >= ${{ env.EMERGENCY_THRESHOLD }}" | bc -l) )); then
            LEVEL="emergency"
          elif (( $(echo "$SPEND >= ${{ env.ESCALATE_THRESHOLD }}" | bc -l) )); then
            LEVEL="escalate"
          elif (( $(echo "$SPEND >= ${{ env.WARN_THRESHOLD }}" | bc -l) )); then
            LEVEL="warn"
          elif (( $(echo "$PROJECTED >= ${{ env.EMERGENCY_THRESHOLD }}" | bc -l) )); then
            LEVEL="projected-emergency"
          elif (( $(echo "$PROJECTED >= ${{ env.ESCALATE_THRESHOLD }}" | bc -l) )); then
            LEVEL="projected-escalate"
          fi

          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "::notice::Azure spend: €$SPEND / €${{ env.BUDGET_LIMIT }} ($PERCENT%) | Projected: €$PROJECTED ($PROJECTED_PERCENT%) | Level: $LEVEL"

      # --- LEVEL: OK — no action needed ---

      # --- LEVEL: WARN (80% / €400) — Tank alert ---
      - name: 'Alert: 80% budget warning (Tank)'
        if: contains(fromJSON('["warn"]'), steps.cost.outputs.level)
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Azure cost alert — €${process.env.SPEND} / €${process.env.BUDGET_LIMIT} (${process.env.PERCENT}%)`;
            const body = [
              `### ⚠️ Azure Budget Warning — 80% Threshold`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Current spend** | €${process.env.SPEND} |`,
              `| **Budget limit** | €${process.env.BUDGET_LIMIT} |`,
              `| **Usage** | ${process.env.PERCENT}% |`,
              `| **Projected EOM** | €${process.env.PROJECTED} (${process.env.PROJECTED_PERCENT}%) |`,
              `| **Day** | ${process.env.DAY} of ${process.env.DAYS_IN_MONTH} |`,
              ``,
              `**Action required:** Review resource usage. Consider scaling down non-essential services.`,
              ``,
              `> 🔄 Auto-generated by cost-alert workflow. Next escalation at €${process.env.ESCALATE_THRESHOLD}.`
            ].join('\n');

            // Check for existing open alert issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cost-alert,priority:P1',
              state: 'open',
              per_page: 1
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `### 📊 Daily Update\n\nSpend: **€${process.env.SPEND}** (${process.env.PERCENT}%) | Projected: €${process.env.PROJECTED}`
              });
              core.info(`Updated existing alert issue #${existing[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cost-alert', 'priority:P1', 'squad:tank']
              });
              core.info('Created P1 cost alert issue');
            }
        env:
          SPEND: ${{ steps.cost.outputs.spend }}
          PROJECTED: ${{ steps.cost.outputs.projected }}
          PERCENT: ${{ steps.cost.outputs.percent }}
          PROJECTED_PERCENT: ${{ steps.cost.outputs.projected_percent }}
          BUDGET_LIMIT: ${{ env.BUDGET_LIMIT }}
          ESCALATE_THRESHOLD: ${{ env.ESCALATE_THRESHOLD }}
          DAY: ${{ steps.cost.outputs.day }}
          DAYS_IN_MONTH: ${{ steps.cost.outputs.days_in_month }}

      # --- LEVEL: ESCALATE (90% / €450) — Morpheus + founder ---
      - name: 'Escalation: 90% budget critical (Morpheus + Founder)'
        if: contains(fromJSON('["escalate"]'), steps.cost.outputs.level)
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔴 CRITICAL — Azure spend €${process.env.SPEND} / €${process.env.BUDGET_LIMIT} (${process.env.PERCENT}%) — ESCALATION`;
            const body = [
              `### 🔴 Azure Budget CRITICAL — 90% Threshold`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Current spend** | €${process.env.SPEND} |`,
              `| **Budget limit** | €${process.env.BUDGET_LIMIT} |`,
              `| **Usage** | ${process.env.PERCENT}% |`,
              `| **Projected EOM** | €${process.env.PROJECTED} (${process.env.PROJECTED_PERCENT}%) |`,
              ``,
              `**⚡ ESCALATED to Morpheus (Lead) and @joperezd (Founder).**`,
              ``,
              `**Immediate actions:**`,
              `1. Review all running Azure resources`,
              `2. Identify and stop non-essential workloads`,
              `3. If spend reaches €${process.env.EMERGENCY_THRESHOLD}, auto-kill will activate`,
              ``,
              `> 🚨 Next threshold: €${process.env.EMERGENCY_THRESHOLD} triggers automatic resource termination.`
            ].join('\n');

            // Close any P1 warning issues — this supersedes them
            const { data: warnings } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cost-alert,priority:P1',
              state: 'open',
              per_page: 5
            });
            for (const w of warnings) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: w.number,
                state: 'closed',
                state_reason: 'completed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: w.number,
                body: '⬆️ Escalated to P0 — spend exceeded 90% threshold.'
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['cost-alert', 'priority:P0', 'squad:morpheus', 'squad:tank']
            });
            core.warning('🔴 Budget escalation: 90% threshold reached');
        env:
          SPEND: ${{ steps.cost.outputs.spend }}
          PROJECTED: ${{ steps.cost.outputs.projected }}
          PERCENT: ${{ steps.cost.outputs.percent }}
          PROJECTED_PERCENT: ${{ steps.cost.outputs.projected_percent }}
          BUDGET_LIMIT: ${{ env.BUDGET_LIMIT }}
          EMERGENCY_THRESHOLD: ${{ env.EMERGENCY_THRESHOLD }}

      # --- LEVEL: EMERGENCY (96% / €480) — auto-kill idle resources ---
      - name: 'EMERGENCY: 96% — auto-kill idle resources'
        if: >-
          contains(fromJSON('["emergency"]'), steps.cost.outputs.level)
          && inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          echo "🚨 EMERGENCY: Spend at €${{ steps.cost.outputs.spend }} — initiating auto-kill"

          KILLED=""

          # 1. Deallocate all VMs not tagged "protected"
          VMS=$(az vm list --query "[?tags.protected != 'true'].{name:name, rg:resourceGroup}" -o tsv 2>/dev/null || true)
          while IFS=$'\t' read -r VM_NAME RG; do
            [ -z "$VM_NAME" ] && continue
            echo "Deallocating VM: $VM_NAME (RG: $RG)"
            az vm deallocate --name "$VM_NAME" --resource-group "$RG" --no-wait || true
            KILLED="$KILLED\n- VM: $VM_NAME ($RG)"
          done <<< "$VMS"

          # 2. Stop non-production App Services not tagged "protected"
          APPS=$(az webapp list --query "[?tags.protected != 'true' && tags.env != 'production'].{name:name, rg:resourceGroup}" -o tsv 2>/dev/null || true)
          while IFS=$'\t' read -r APP_NAME RG; do
            [ -z "$APP_NAME" ] && continue
            echo "Stopping App Service: $APP_NAME (RG: $RG)"
            az webapp stop --name "$APP_NAME" --resource-group "$RG" || true
            KILLED="$KILLED\n- App Service: $APP_NAME ($RG)"
          done <<< "$APPS"

          # 3. Scale down any Standard/Premium resources to Free/Basic
          # (Container instances — stop all non-protected)
          CONTAINERS=$(az container list --query "[?tags.protected != 'true'].{name:name, rg:resourceGroup}" -o tsv 2>/dev/null || true)
          while IFS=$'\t' read -r C_NAME RG; do
            [ -z "$C_NAME" ] && continue
            echo "Stopping container: $C_NAME (RG: $RG)"
            az container stop --name "$C_NAME" --resource-group "$RG" || true
            KILLED="$KILLED\n- Container: $C_NAME ($RG)"
          done <<< "$CONTAINERS"

          if [ -z "$KILLED" ]; then
            echo "No killable resources found (all may be tagged 'protected')"
            echo "killed=none" >> "$GITHUB_OUTPUT"
          else
            echo -e "Resources killed:$KILLED"
            echo "killed<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$KILLED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
        id: kill

      - name: 'EMERGENCY: Create incident issue'
        if: contains(fromJSON('["emergency"]'), steps.cost.outputs.level)
        uses: actions/github-script@v7
        with:
          script: |
            const isDryRun = '${{ inputs.dry_run }}' === 'true';
            const killed = process.env.KILLED || 'none';
            const prefix = isDryRun ? '[DRY RUN] ' : '';

            const title = `${prefix}🚨 EMERGENCY — Azure €${process.env.SPEND} (96%+) — resources ${isDryRun ? 'would be' : ''} terminated`;
            const body = [
              `### 🚨 EMERGENCY COST ACTION — 96% Budget Threshold`,
              ``,
              `**Spend:** €${process.env.SPEND} / €${process.env.BUDGET_LIMIT} (${process.env.PERCENT}%)`,
              isDryRun ? `**Mode:** DRY RUN — no resources were actually stopped` : '',
              ``,
              `**Resources ${isDryRun ? 'that would be' : ''} terminated:**`,
              killed === 'none' ? '_No killable resources found (all tagged `protected`)_' : killed,
              ``,
              `**To protect a resource from auto-kill:** tag it with \`protected: true\` in Azure.`,
              ``,
              `> ⚠️ This is an automated emergency action. Review and restart essential services manually.`
            ].filter(Boolean).join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['cost-alert', 'priority:P0', 'incident', 'squad:tank', 'squad:morpheus']
            });
        env:
          SPEND: ${{ steps.cost.outputs.spend }}
          PERCENT: ${{ steps.cost.outputs.percent }}
          BUDGET_LIMIT: ${{ env.BUDGET_LIMIT }}
          KILLED: ${{ steps.kill.outputs.killed }}

      # --- PROJECTED ALERTS (proactive) ---
      - name: 'Proactive: projected overspend warning'
        if: contains(fromJSON('["projected-escalate", "projected-emergency"]'), steps.cost.outputs.level)
        uses: actions/github-script@v7
        with:
          script: |
            const level = '${{ steps.cost.outputs.level }}';
            const isEmergency = level === 'projected-emergency';
            const emoji = isEmergency ? '🔴' : '🟡';
            const priority = isEmergency ? 'P0' : 'P1';

            const title = `${emoji} Projected overspend — €${process.env.PROJECTED} by end of month`;
            const body = [
              `### ${emoji} Projected Budget ${isEmergency ? 'Emergency' : 'Warning'}`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Current spend** | €${process.env.SPEND} (day ${process.env.DAY}/${process.env.DAYS_IN_MONTH}) |`,
              `| **Projected EOM** | €${process.env.PROJECTED} (${process.env.PROJECTED_PERCENT}%) |`,
              `| **Budget limit** | €${process.env.BUDGET_LIMIT} |`,
              ``,
              `Current burn rate projects **€${process.env.PROJECTED}** by end of month.`,
              isEmergency
                ? `This would trigger the **emergency auto-kill** at €${process.env.EMERGENCY_THRESHOLD}.`
                : `Action recommended to avoid escalation.`,
              ``,
              `> Proactive alert based on linear extrapolation. Actual spend may vary.`
            ].join('\n');

            const labels = ['cost-alert', `priority:${priority}`, 'squad:tank'];
            if (isEmergency) labels.push('squad:morpheus');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });
        env:
          SPEND: ${{ steps.cost.outputs.spend }}
          PROJECTED: ${{ steps.cost.outputs.projected }}
          PROJECTED_PERCENT: ${{ steps.cost.outputs.projected_percent }}
          BUDGET_LIMIT: ${{ env.BUDGET_LIMIT }}
          EMERGENCY_THRESHOLD: ${{ env.EMERGENCY_THRESHOLD }}
          DAY: ${{ steps.cost.outputs.day }}
          DAYS_IN_MONTH: ${{ steps.cost.outputs.days_in_month }}

  # Lightweight cost summary — runs even without Azure creds (uses GH issue history)
  cost-summary:
    runs-on: ubuntu-latest
    if: always()
    needs: cost-check
    steps:
      - name: Summary
        run: |
          echo "## Cost Alert Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Budget | €${{ env.BUDGET_LIMIT }}/mo |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Warn (80%) | €${{ env.WARN_THRESHOLD }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Escalate (90%) | €${{ env.ESCALATE_THRESHOLD }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Emergency (96%) | €${{ env.EMERGENCY_THRESHOLD }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.cost-check.result }}" = "skipped" ]; then
            echo "⚠️ **Cost check skipped** — no Azure credentials configured." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "To enable: add \`AZURE_CREDENTIALS\` secret and \`AZURE_SUBSCRIPTION_ID\` variable." >> "$GITHUB_STEP_SUMMARY"
          fi
