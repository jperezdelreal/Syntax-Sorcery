# Game Build Workflow (Template for game repos)
# Copy this to: .github/workflows/build.yml in each game repository
name: "Build Game"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect build type
        id: detect
        run: |
          if [ -f "package.json" ] && node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
            echo "type=npm" >> "$GITHUB_OUTPUT"
            echo "Build type: npm (package.json with build script)"
          else
            echo "type=static" >> "$GITHUB_OUTPUT"
            echo "Build type: static (copy files to dist/)"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.type == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build (npm)
        if: steps.detect.outputs.type == 'npm'
        run: |
          npm ci
          npm run build

      - name: Build (static)
        if: steps.detect.outputs.type == 'static'
        run: |
          mkdir -p dist
          # Copy all game files to dist, excluding dev/meta files
          rsync -av --exclude='dist/' --exclude='.git/' --exclude='.github/' \
            --exclude='node_modules/' --exclude='package*.json' \
            --exclude='.gitignore' --exclude='README.md' \
            ./ dist/ || cp -r *.html *.js *.css assets/ dist/ 2>/dev/null || true
          # Ensure index.html exists
          if [ ! -f "dist/index.html" ] && [ -f "index.html" ]; then
            cp index.html dist/
          fi

      - name: Validate build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html not found!"
            exit 1
          fi

          echo "✅ dist/index.html exists"

          # Check JS syntax on all .js files in dist
          for f in dist/*.js; do
            if [ -f "$f" ]; then
              node --check "$f" && echo "  ✅ $f — syntax OK" || echo "  ⚠️ $f — syntax warning"
            fi
          done

          # Size report
          TOTAL=$(du -sh dist/ | cut -f1)
          echo "📦 Total build size: ${TOTAL}"

          SIZE_BYTES=$(du -sb dist/ | cut -f1)
          if [ "$SIZE_BYTES" -gt 10485760 ]; then
            echo "⚠️ WARNING: Build exceeds 10MB soft limit"
          fi

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Testing deployment at: ${URL}"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment successful — HTTP ${STATUS}"
          else
            echo "⚠️ Deployment may still be propagating — HTTP ${STATUS}"
          fi
